name: Test Promotion Gates

on:
  push:
    branches: [ "develop", "staging", "main" ]
  pull_request:
    branches: [ "develop", "staging", "main" ]
  workflow_dispatch:

jobs:
  test-dev:
    name: Dev Validation
    if: |
      (github.event_name == 'push' && github.ref_name == 'develop') ||
      (github.event_name == 'pull_request' && github.base_ref == 'develop')
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ✅ Run tests + coverage + lint
      - run: npm test
      - run: npm run test:coverage
      - run: npm run lint

      # ✅ Upload to Codecov
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      # ✅ Build and run E2E tests
      - run: npm run build

      - name: Start server
        run: node dist/src/index.js &
        env:
          PORT: 3000
          API_KEY: local-dev-token
          OPENELECTRICITY_API_KEY: ${{ secrets.OPENELECTRICITY_API_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Wait for server
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000/v1/health && break
            echo "Waiting... attempt $i"
            sleep 2
          done

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:3000
          API_KEY: local-dev-token

      # ✅ Generate PDF report
      - run: npm run generate:report
        continue-on-error: true

      # ✅ Rename PDF dynamically
      - run: mv report.pdf report-${{ github.run_id }}.pdf

      # ✅ Upload PDF artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.run_id }}
          path: report-${{ github.run_id }}.pdf


  test-staging:
    name: Staging Validation
    if: |
      (github.event_name == 'push' && github.ref_name == 'staging') ||
      (github.event_name == 'pull_request' && github.base_ref == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ✅ Run tests + coverage + lint
      - run: npm test
      - run: npm run test:coverage
      - run: npm run lint

      # ✅ Upload to Codecov
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      # ✅ Build and run E2E tests
      - run: npm run build

      - name: Start server
        run: node dist/src/index.js &
        env:
          PORT: 3000
          API_KEY: local-dev-token
          OPENELECTRICITY_API_KEY: ${{ secrets.OPENELECTRICITY_API_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Wait for server
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000/v1/health && break
            echo "Waiting... attempt $i"
            sleep 2
          done

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:3000
          API_KEY: local-dev-token

      # ✅ Generate PDF report
      - run: npm run generate:report
        continue-on-error: true

      # ✅ Rename PDF dynamically
      - run: mv report.pdf report-${{ github.run_id }}.pdf

      # ✅ Upload PDF artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.run_id }}
          path: report-${{ github.run_id }}.pdf


  test-production:
    name: Production Validation
    if: |
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ✅ Run tests + coverage + lint
      - run: npm test
      - run: npm run test:coverage
      - run: npm run lint

      # ✅ Upload to Codecov
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      # ✅ Build and run E2E tests
      - run: npm run build

      - name: Start server
