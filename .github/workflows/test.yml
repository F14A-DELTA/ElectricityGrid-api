name: Test Promotion Gates

on:
  push:
    branches: [ "develop", "staging", "main" ]
  pull_request:
    branches: [ "develop", "staging", "main" ]
  workflow_dispatch:

jobs:
  test-dev:
    name: Dev Validation
    if: |
      (github.event_name == 'push' && github.ref_name == 'develop') ||
      (github.event_name == 'pull_request' && github.base_ref == 'develop')
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ✅ Run tests + coverage + lint
      - run: npm test
      - run: npm run test:coverage
      - run: npm run lint

      # ✅ Upload to Codecov
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      # ✅ Generate PDF report
      - run: npm run generate:report
      - run: npm run report:pdf

      # ✅ Rename PDF dynamically
      - run: mv report.pdf report-${{ github.ref_name }}.pdf

      # ✅ Upload PDF artifact
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.ref_name }}
          path: report-${{ github.ref_name }}.pdf


  test-staging:
    name: Staging Validation
    if: |
      (github.event_name == 'push' && github.ref_name == 'staging') ||
      (github.event_name == 'pull_request' && github.base_ref == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test
      - run: npm run test:coverage
      - run: npm run lint

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      - run: npm run generate:report
      - run: npm run report:pdf

      - run: mv report.pdf report-${{ github.ref_name }}.pdf

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.ref_name }}
          path: report-${{ github.ref_name }}.pdf


  test-production:
    name: Production Validation
    if: |
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test
      - run: npm run test:coverage
      - run: npm run lint

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      - run: npm run generate:report
      - run: npm run report:pdf

      - run: mv report.pdf report-${{ github.ref_name }}.pdf

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.ref_name }}
          path: report-${{ github.ref_name }}.pdf
